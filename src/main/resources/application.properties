# ========================================
# R2DBC - Conexion Reactiva a MySQL
# ========================================
# sslMode=DISABLED desactiva SSL (necesario para AppServ/MySQL local sin SSL)
spring.r2dbc.url=r2dbc:mysql://localhost:3306/orders_db?sslMode=DISABLED&allowPublicKeyRetrieval=true
spring.r2dbc.username=root
spring.r2dbc.password=

# ========================================
# Internacionalizacion (i18n)
# ========================================
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8

# ========================================
# WebFlux - Problem Details (RFC 7807)
# ========================================
spring.webflux.problemdetails.enabled=true

# ========================================
# JWT (mapeado por JwtProperties.java)
# ========================================
app.jwt.secret=cGVkaWRvc1RyYWNraW5nU2VjcmV0S2V5MjAyNkFCQ0RFRkdI
app.jwt.expiration-ms=86400000

# ========================================
# Logging
# ========================================
logging.level.org.springframework.r2dbc=DEBUG
logging.level.com.miempresa.backend_final=DEBUG